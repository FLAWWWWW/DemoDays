<div class="container py-5 text-white">

  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-light" role="status"></div>
  </div>

  <div *ngIf="error" class="text-center text-danger py-5">
    {{ error }}
  </div>

  <div *ngIf="event && !loading">
    <!-- Шапка ивента -->
    <section id="about" class="py-5">
      <div class="container text-center">
        <div class="rounded-4 mx-auto mb-4 shadow overflow-hidden" 
             style="max-width: 800px; height: 350px; background: #25254d;">
          <img *ngIf="event.image" [src]="event.image" 
               class="w-100 h-100" style="object-fit: cover;" [alt]="event.title">
        </div>
        <h1 class="fw-bold mb-2">{{ event.title }}</h1>
        <p class="opacity-75">📅 {{ event.date }} &nbsp;|&nbsp; 📍 {{ event.location }}</p>
        <p class="text-white opacity-75 mx-auto" style="max-width: 700px;">
          {{ event.description }}
        </p>
      </div>
    </section>

    <hr class="section-divider">

    <!-- Presentations — статично пока нет данных -->
    <section id="presentations" class="py-5">
      <div class="container">
        <h2 class="text-center text-white mb-5 display-5 fw-bold">Presentations</h2>
        <div class="bg-secondary-subtle p-4 p-md-5 rounded-4 shadow">
          <p class="text-center opacity-50">No presentations yet</p>
        </div>
      </div>
    </section>

    <hr class="section-divider">

    <!-- Location -->
    <section id="location" class="py-5">
      <div class="container text-center text-white">
        <h2 class="mb-5 display-5 fw-bold">Location</h2>
        <p class="opacity-75 fs-5">📍 {{ event.location }}</p>
        <div class="bg-secondary-subtle rounded-4 shadow overflow-hidden" style="height: 400px;">
          <div class="d-flex h-100 align-items-center justify-content-center text-muted">
            Map Placeholder
          </div>
        </div>
      </div>
    </section>
  </div>

</div>
