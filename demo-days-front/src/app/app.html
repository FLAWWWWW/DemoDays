<div class="header-bg sticky-top" style="z-index: 1020;">
  <header class="container">
    <nav class="navbar navbar-expan-lg py-2">
      <div class="container-fluid">
        <div class = "navbar-nav me-auto d-flex flex-row gap-4">

          <a class="nav-link text-white fw-bold" href = "#">Events</a>

          <a class="nav-link text-white fw-bold" href = "#">About</a>
        </div>

        <div class="d-flex align-items-center text-white">
          <div class="dropdown" ngbDropdown>
            <button class="btn text-white fw-bold border-0" ngbDropdownToggle>
              Rus
            </button>
            <ul class="dropdown-menu dropdown-menu-end shadow" ngbDropdownMenu>
              <li><a class="dropdown-item" href="#">Kz</a></li>
              <li><a class="dropdown-item" href="#">Eng</a></li>
            </ul>
          </div>
          <i class="bi bi-person-circle fs-2 ms-3"></i>
        </div>
      </div>
    </nav>
  </header>
</div>

<main>
  <router-outlet></router-outlet>
</main>

<footer class="main-footer py-5 mt-5">
  <div class="container">
    <div class="row">
      <div class="col-md-3">
        <img src="logo.png" width="60" class="mb-3">
        <div class="d-flex gap-2 fs-4">
          <i class="bi bi-facebook"></i>
          <i class="bi bi-telegram"></i>
          <i class="bi bi-whatsapp"></i>
        </div>
      </div>
      <div class="col-md-3">
        <h5>DemoDay</h5>
        <p class="mb-1 opacity-75">About</p>
        <p class="opacity-75">Contacts</p>
      </div>
      <div class="col-md-6">
        <h5>Newsletter</h5>
        <p class="mb-1 opacity-75">
          We select the week's key events and then share them in an engaging way in our newsletter.
        </p>
        <div class="input-group mt-2">
          <input [formControl]="email" type="email" class="form-control border-0" 
                placeholder="E-mail" style="background: #e0e0e0;">
          <button (click)="onSubmit()" [disabled]="email.invalid"
                  class="btn text-white px-4" style="background-color: #5a00b3;">Send</button>
        </div>
        <p *ngIf="submitted" style="color: #e0e0e0;" class="mt-2 fw-bold">Email sended</p>
        <p *ngIf="errorMessage" style="color: #e91e63;" class="mt-2 fw-bold">{{ errorMessage }}</p>
      </div>
    </div>
  </div>
</footer>
