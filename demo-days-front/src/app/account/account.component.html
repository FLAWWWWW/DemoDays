<div class="container py-5 text-white" style="background-color: #0f1021; min-height: 100vh;">
  <h2 class="mb-4 fw-bold">Account Setting</h2>

  <div class="p-4 mb-5" style="background-color: #c5c6e0; border-radius: 12px; color: #333;">
    <div class="d-flex align-items-center mb-4">
      <div class="bg-secondary rounded-circle d-flex align-items-center justify-content-center" style="width: 80px; height: 80px;">
        <i class="bi bi-person-fill text-white fs-1"></i>
      </div>
      <button class="btn btn-light btn-sm ms-3 border shadow-sm">Load Avatar</button>
    </div>

    <form [formGroup]="profileForm">
      <div class="row g-3">
        <div class="col-md-6">
          <input type="text" formControlName="name" class="form-control border-0 py-2" placeholder="Name">
        </div>
        <div class="col-md-6">
          <input type="text" formControlName="surname" class="form-control border-0 py-2" placeholder="Surname">
        </div>

        <div class="col-md-6">
          <input type="text" formControlName="phone" class="form-control border-0 py-2" placeholder="Phone Number">
        </div>
        <div class="col-md-6">
          <input type="email" formControlName="email" class="form-control border-0 py-2" placeholder="E-mail">
        </div>

        <div class="col-12 mt-3">
          <label class="fw-bold mb-2">Change Role</label>
          <div class="btn-group w-100">
            <button type="button" (click)="profileForm.patchValue({role: 'Guest'})"
                    [class.btn-primary]="profileForm.value.role === 'Guest'"
                    [class.btn-outline-primary]="profileForm.value.role !== 'Guest'"
                    class="btn border-1">Guest</button>
            <button type="button" (click)="profileForm.patchValue({role: 'Speaker'})"
                    [class.btn-primary]="profileForm.value.role === 'Speaker'"
                    [class.btn-outline-primary]="profileForm.value.role !== 'Speaker'"
                    class="btn border-1">Speaker</button>
            <button type="button" (click)="profileForm.patchValue({role: 'Development'})"
                    [class.btn-primary]="profileForm.value.role === 'Development'"
                    [class.btn-outline-primary]="profileForm.value.role !== 'Development'"
                    class="btn border-1">Development</button>
          </div>
        </div>

        <div class="col-12 mt-3">
          <textarea formControlName="bio" class="form-control border-0 py-2" rows="3" placeholder="Biography"></textarea>
        </div>
      </div>

      <div class="d-flex justify-content-end mt-4">
        <button class="btn text-white px-5 fw-bold" style="background-color: #f5317f; border-radius: 5px;">Save</button>
      </div>
    </form>
  </div>

  <h2 class="mb-4 fw-bold">Change Password</h2>

  <div class="p-4" style="background-color: #c5c6e0; border-radius: 12px; color: #333;">
    <form [formGroup]="passwordForm">
      <div class="row g-3">
        <div class="col-md-6">
          <input type="password" formControlName="oldPassword" class="form-control border-0 py-2" placeholder="Old Password">
        </div>
        <div class="col-md-6">
          <input type="password" formControlName="newPassword" class="form-control border-0 py-2" placeholder="New Password">
        </div>
      </div>
      <button class="btn btn-light mt-4 border px-4">Save changes</button>
    </form>
  </div>
</div>
