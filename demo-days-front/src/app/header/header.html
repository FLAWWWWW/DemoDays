<div class="auth-section">
    @if (!isLoggedIn){
        <button routerLink="/login" class="btn-signin">
            Sign In
        </button>
    }

    @if (isLoggedIn){
        <div class="user-profile">
            <img src="assets/default-avatar.png" alt="Avatar" class="avatar-icon" (click)="logout()" style="cursor: pointer;">
            <button (click)="logout()">Logout</button>
        </div>
    }
</div>
